<section class="freetext-word-cloud-dialog">
  <button
    mat-icon-button
    type="button"
    class="freetext-word-cloud-dialog__close"
    matDialogClose
    i18n-aria-label="@@wordCloud.dialogCloseAria"
    aria-label="Wortwolke schließen"
  >
    <mat-icon aria-hidden="true">close</mat-icon>
  </button>

  <div class="freetext-word-cloud-dialog__toolbar">
    <mat-button-toggle-group
      class="freetext-word-cloud-dialog__analysis-toggle"
      [value]="analysisVariant()"
      (valueChange)="setAnalysisVariant($any($event))"
      i18n-aria-label="@@sessionHost.wordCloudAnalysisAria"
      aria-label="Wortwolken-Ansicht"
    >
      <mat-button-toggle value="WORDS" i18n="@@sessionHost.wordCloudAnalysisWords"
        >Einzelwörter</mat-button-toggle
      >
      <mat-button-toggle value="PHRASES" i18n="@@sessionHost.wordCloudAnalysisPhrases"
        >Wörter &amp; Phrasen</mat-button-toggle
      >
    </mat-button-toggle-group>
    <button
      mat-button
      type="button"
      class="freetext-word-cloud-dialog__freeze"
      [class.freetext-word-cloud-dialog__freeze--active]="frozen()"
      [attr.aria-pressed]="frozen()"
      (click)="toggleFreeze()"
    >
      <mat-icon aria-hidden="true">{{ frozen() ? 'play_arrow' : 'pause' }}</mat-icon>
      <span>{{ freezeLabel() }}</span>
    </button>
  </div>

  <app-word-cloud
    class="freetext-word-cloud-dialog__cloud"
    [responses]="responses()"
    [terms]="terms()"
    [selectionScopeKey]="selectionScopeKey()"
    [eyebrow]="data.eyebrow"
    [description]="data.description"
    [showResponsesPanel]="false"
    [showReleaseNote]="false"
    [showMaximizeAction]="false"
    [presentationMode]="true"
  />
</section>
